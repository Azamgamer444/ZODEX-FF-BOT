<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JODEX PRO BOT</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Arial', sans-serif;
            background: radial-gradient(circle, #1a0b2e 0%, #05010d 100%);
            color: white; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .container {
            text-align: center; background: rgba(255, 255, 255, 0.05);
            padding: 30px; border-radius: 20px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); width: 85%; max-width: 380px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7); display: none;
        }

        .active { display: block; animation: zoomIn 0.3s; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        h1 { font-size: 30px; color: #ff00ff; text-transform: uppercase; text-shadow: 0 0 15px #ff00ff; margin-bottom: 5px; }
        .tagline { color: #00d4ff; font-size: 12px; font-weight: bold; margin-bottom: 25px; display: block; }

        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4); color: white; text-align: center; font-size: 18px; margin-bottom: 20px; box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            color: white; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card {
            background: rgba(255, 255, 255, 0.07); padding: 15px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; font-weight: bold; transition: 0.2s;
            font-size: 13px;
        }
        .card:hover, .selected { background: #ff00ff; border-color: white; transform: translateY(-2px); }

        #terminal {
            background: #000; border: 1px solid #333; border-radius: 10px;
            padding: 15px; text-align: left; height: 180px; overflow: hidden;
            font-size: 11px; color: #0f0; line-height: 1.8; margin-bottom: 15px;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99; display: none; }
        .success-box {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: black; padding: 30px; border-radius: 20px;
            width: 80%; max-width: 300px; text-align: center; z-index: 100; display: none;
        }
        .success-box h2 { color: #27ae60; margin: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container active" id="step1">
        <h1>JODEX PRO</h1>
        <span class="tagline">PREMIUM ACCESS ONLY</span>
        <input type="text" id="passInput" placeholder="Enter Password">
        <button class="btn" onclick="checkPass()">Login</button>
        <p style="font-size: 10px; margin-top: 15px; color: #777;">Get password from YouTube</p>
    </div>

    <div class="container" id="step2">
        <h2>SELECT REGION</h2>
        <div class="grid">
            <div class="card" onclick="sel(this, 'n2')">INDIA</div>
            <div class="card" onclick="sel(this, 'n2')">PAKISTAN</div>
            <div class="card" onclick="sel(this, 'n2')">BANGLADESH</div>
            <div class="card" onclick="sel(this, 'n2')">NEPAL</div>
        </div>
        <button class="btn hidden" id="n2" onclick="show(3)">Next Step</button>
    </div>

    <div class="container" id="step3">
        <h2>SELECT BOT TYPE</h2>
        <div class="grid">
            <div class="card" onclick="sel(this, 'n3')">FAST BOT</div>
            <div class="card" onclick="sel(this, 'n3')">ROBOT</div>
            <div class="card" onclick="sel(this, 'n3')">PREMIUM BOT</div>
            <div class="card" onclick="sel(this, 'n3')">BASIC BOT</div>
        </div>
        <button class="btn hidden" id="n3" onclick="show(4)">Proceed</button>
    </div>

    <div class="container" id="step4">
        <h2>PLAYER UID</h2>
        <input type="number" id="uid" placeholder="Enter Your Game UID">
        <button class="btn" onclick="startLoading()">Activate JODEX PRO</button>
    </div>

    <div class="container" id="step5">
        <h2 style="color:#0f0">INJECTING...</h2>
        <div id="terminal"></div>
        <div style="width:100%; background:#222; height:8px; border-radius:4px; overflow:hidden;">
            <div id="bar" style="width:0%; height:100%; background:#0f0;"></div>
        </div>
        <p id="perc" style="margin-top:10px">0%</p>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="success-box" id="successBox">
        <div style="font-size: 50px;">🔥</div>
        <h2>Sent Successfully!</h2>
        <p><b>JODEX PRO</b> scripts have been injected into your UID. Check game in 24h.</p>
        <button class="btn" onclick="location.reload()" style="margin-top:15px">CLOSE</button>
    </div>

    <script>
        function checkPass() {
            // पासवर्ड अभी भी 6565 ही है, बस बॉक्स में नहीं दिखेगा
            if (document.getElementById('passInput').value === "6565") {
                show(2);
            } else {
                alert("Incorrect Password! Please watch the full video.");
            }
        }

        function show(n) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById('step' + n).classList.add('active');
        }

        function sel(el, nextId) {
            el.parentElement.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById(nextId).classList.remove('hidden');
        }

        function startLoading() {
            const uidVal = document.getElementById('uid').value;
            if(!uidVal || uidVal.length < 5) return alert("Please enter a valid UID!");
            
            show(5);
            let i = 0;
            const term = document.getElementById('terminal');
            const logs = [
                "> Connecting to Secure Server...",
                "> Locating UID: " + uidVal,
                "> Bypassing Encryption...",
                "> Injecting Premium Scripts...",
                "> Verifying Bot Status...",
                "> Server Connection: Stable",
                "> Optimizing Game Data...",
                "> Done! Sending to Global Cloud..."
            ];

            const interval = setInterval(() => {
                if (i < logs.length) {
                    term.innerHTML += `<div>${logs[i]}</div>`;
                    let p = Math.floor(((i+1)/logs.length)*100);
                    document.getElementById('bar').style.width = p + "%";
                    document.getElementById('perc').innerText = p + "%";
                    i++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('overlay').style.display = 'block';
                        document.getElementById('successBox').style.display = 'block';
                    }, 500);
                }
            }, 700);
        }
    </script>
</body>
</html>
