<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZODEX PRO - FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00d2ff; --dark-bg: #020617; }
        
        /* बैकग्राउंड को फिक्स किया गया ताकि वह रिपीट न हो */
        body { 
            background: var(--dark-bg); 
            color: #f8fafc; 
            font-family: 'Orbitron', sans-serif; 
            overflow: hidden; 
            margin: 0; height: 100vh; width: 100vw; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        .bg-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
            z-index: -1; 
        }

        /* ट्रायंगुलर पैटर्न */
        .bg-lines {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(45deg, rgba(0, 210, 255, 0.03) 25%, transparent 25%), 
                              linear-gradient(-45deg, rgba(0, 210, 255, 0.03) 25%, transparent 25%);
            background-size: 60px 60px;
        }

        /* बॉक्स स्टाइल */
        .neon-box { 
            background: rgba(15, 23, 42, 0.98); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 210, 255, 0.4); 
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.25); 
            padding: 2.5rem 1.5rem; 
            border-radius: 1.5rem; 
            width: 90%; max-width: 350px; 
            text-align: center;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .neon-btn { 
            border: 2px solid var(--neon-blue); color: var(--neon-blue); 
            padding: 1rem; width: 100%; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; border-radius: 0.75rem; 
            margin-top: 1.5rem; transition: 0.2s; 
        }
        .neon-btn:active { background: var(--neon-blue); color: #000; }
        
        input, select { 
            background: #000 !important; border: 1px solid #1e293b !important; 
            color: #fff !important; width: 100%; padding: 1rem; 
            border-radius: 0.5rem; text-align: center; margin-bottom: 1rem; outline: none; 
        }
    </style>
</head>
<body>
    <div class="bg-container"><div class="bg-lines"></div></div>

    <div id="app-root" class="w-full flex justify-center"></div>

    <script>
        const root = document.getElementById('app-root');
        const PALLA_IP = "http://YOUR_SERVER_IP:8080"; 

        // यह फंक्शन पुरानी स्क्रीन को हटाकर नई स्क्रीन लोड करेगा (Fixes Repeat Issue)
        function render(html) {
            root.innerHTML = `<div class="neon-box">${html}</div>`;
        }

        // STEP 1: SYSTEM BOOTING
        function showBoot() {
            render(`
                <h2 class="text-cyan-400 font-bold mb-8 tracking-[4px] text-xs uppercase">System Booting</h2>
                <div class="h-1.5 w-full bg-gray-900 rounded-full overflow-hidden border border-cyan-900">
                    <div id="pBar" class="h-full bg-cyan-400" style="width:0%"></div>
                </div>
            `);
            let p = 0;
            let i = setInterval(() => {
                p += 5;
                const bar = document.getElementById('pBar');
                if(bar) bar.style.width = p + "%";
                if(p >= 100) { clearInterval(i); setTimeout(showLogin, 500); }
            }, 100);
        }

        // STEP 2: SECURITY CHECK
        function showLogin() {
            render(`
                <h2 class="text-cyan-400 font-black mb-10 tracking-widest uppercase">Security Check</h2>
                <input type="password" id="sk" placeholder="ENTER ACCESS KEY">
                <button onclick="valLogin()" class="neon-btn">Authenticate</button>
            `);
        }

        function valLogin() {
            if(document.getElementById('sk').value === "zodex bot 1000") showDash();
            else alert("ACCESS DENIED!");
        }

        // STEP 3: DASHBOARD
        function showDash() {
            render(`
                <h1 class="text-3xl font-black text-cyan-400 mb-10 italic">ZODEX</h1>
                <select id="reg">
                    <option>INDIA (IND)</option>
                    <option>PAKISTAN (PK)</option>
                    <option>BANGLADESH (BD)</option>
                </select>
                <input type="text" id="gid" maxlength="10" placeholder="GUILD ID (10 DIGITS)">
                <button onclick="startInfect()" class="neon-btn">Execute Injection</button>
            `);
        }

        function startInfect() {
            const id = document.getElementById('gid').value;
            if(id.length === 10 && id.startsWith("30")) {
                fetch(`${PALLA_IP}/api/boost?id=${id}`).catch(() => {});
                showTimer();
            } else alert("Invalid ID!");
        }

        // STEP 4: TIMER
        function showTimer() {
            render(`
                <h2 class="text-cyan-400 font-bold mb-4 tracking-widest text-xs">INJECTING BOTS...</h2>
                <div class="text-6xl font-black text-white py-10 bg-black/40 rounded-xl border border-cyan-500/20 mb-4 font-mono">
                    <span id="m">15</span>:<span id="s">00</span>
                </div>
                <p class="text-[10px] text-gray-500 italic uppercase">DO NOT REFRESH</p>
            `);
            let t = 15 * 60;
            const ti = setInterval(() => {
                t--;
                const min = document.getElementById('m'), sec = document.getElementById('s');
                if(!min) { clearInterval(ti); return; }
                min.innerText = Math.floor(t/60).toString().padStart(2,'0');
                sec.innerText = (t%60).toString().padStart(2,'0');
                if(t <= 0) clearInterval(ti);
            }, 1000);
        }

        showBoot();
    </script>
</body>
</html>
