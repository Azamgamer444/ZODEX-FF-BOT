<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZODEX - Global Glory Injector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050b18; color: #e2e8f0; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .geo-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #0a192f 0%, #050b18 100%); z-index: -1; }
        .neon-border { border: 2px solid #00d2ff; box-shadow: 0 0 15px #00d2ff; }
        .glass-card { background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.2); }
        .step-hidden { display: none; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #005f73); transition: width 1s linear; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(8px); } 50% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake-input { animation: shake 0.3s ease-in-out; border-color: #ef4444 !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <div class="geo-bg"></div>

    <div id="prepScreen" class="text-center w-full max-w-md">
        <h2 id="prepStatus" class="text-cyan-400 font-bold mb-4 animate-pulse uppercase tracking-widest">System Booting...</h2>
        <div class="w-full bg-gray-900 h-1 mb-8 rounded-full overflow-hidden">
            <div id="prepBar" class="h-full bg-cyan-500 shadow-[0_0_10px_#00d2ff] transition-all" style="width:0%"></div>
        </div>
        <button id="startWebBtn" onclick="showPassScreen()" class="step-hidden w-full neon-border bg-cyan-500 text-black font-black py-4 rounded-xl uppercase tracking-widest hover:bg-cyan-400 transition-all">START SYSTEM</button>
    </div>

    <div id="passScreen" class="glass-card step-hidden w-full max-w-md p-8 rounded-3xl text-center">
        <i class="fas fa-lock text-cyan-400 text-4xl mb-4"></i>
        <h2 class="text-xl font-bold mb-6 text-cyan-400 uppercase">Secure Login</h2>
        <input type="password" id="sysPass" placeholder="ENTER ACCESS KEY" class="w-full bg-black border border-cyan-900 rounded-lg py-4 px-4 focus:outline-none focus:border-cyan-400 text-cyan-100 text-center mb-6 font-bold">
        <button onclick="checkPassword()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-4 rounded-xl font-black uppercase transition-all shadow-lg">Unlock Dashboard</button>
    </div>

    <div id="mainDashboard" class="glass-card step-hidden w-full max-w-md p-8 rounded-3xl">
        <h1 class="text-3xl font-black text-center text-cyan-400 mb-8 tracking-tighter uppercase italic">Zodex Injector</h1>
        
        <div class="space-y-5">
            <div>
                <label class="text-[10px] text-cyan-500 uppercase font-bold tracking-widest mb-2 block">Global Server</label>
                <select id="region" class="w-full bg-black border border-cyan-900 p-4 rounded-lg text-sm text-white outline-none focus:border-cyan-400">
                    <option value="IND">INDIA (IND)</option>
                    <option value="PK">PAKISTAN (PK)</option>
                    <option value="BD">BANGLADESH (BD)</option>
                    <option value="BR">BRAZIL (BR)</option>
                    <option value="ME">MIDDLE EAST (ME)</option>
                    <option value="ID">INDONESIA (ID)</option>
                    <option value="VN">VIETNAM (VN)</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] text-cyan-500 uppercase font-bold tracking-widest mb-2 block">Guild ID</label>
                <input type="text" id="guildId" maxlength="10" placeholder="Enter ID" 
                       class="w-full bg-black border border-cyan-900 p-4 text-center text-xl font-bold rounded-lg focus:border-cyan-400 outline-none text-white tracking-[0.2em]">
                
                <p id="errorBox" class="text-red-500 text-[11px] mt-3 font-black text-center hidden uppercase">
                    ❌ UID IS WRONG, PLEASE ENTER CORRECT ID
                </p>
            </div>

            <button onclick="validateAndStart()" class="w-full neon-border bg-cyan-500 text-black font-black py-5 rounded-xl uppercase tracking-widest mt-4 hover:scale-105 transition-transform">
                START INJECTION
            </button>
        </div>
    </div>

    <div id="progressStep" class="glass-card step-hidden w-full max-w-md p-8 rounded-3xl text-center">
        <i class="fas fa-microchip text-cyan-400 text-5xl mb-6 animate-pulse"></i>
        <h2 class="text-cyan-400 font-bold mb-2 uppercase tracking-widest">Injecting 1000 Bots...</h2>
        <div class="w-full bg-gray-900 h-4 rounded-full overflow-hidden mb-6 border border-cyan-900 shadow-inner">
            <div id="mainBar" class="progress-fill"></div>
        </div>
        <div class="text-5xl font-black text-white mb-6 font-mono bg-black/60 py-8 rounded-2xl border border-cyan-500 shadow-[0_0_20px_rgba(0,210,255,0.2)]">
            <span id="mins">15</span>:<span id="secs">00</span>
        </div>
        <p class="text-[10px] text-gray-500 italic uppercase">Connecting to Server... Do not refresh</p>
    </div>

    <div id="uploadStep" class="glass-card step-hidden w-full max-w-md p-8 rounded-3xl text-center">
        <i class="fas fa-cloud-upload-alt text-cyan-400 text-6xl mb-6"></i>
        <h2 class="text-xl font-black mb-4 uppercase text-white">Security Check</h2>
        <p class="text-xs text-gray-400 mb-8 px-4">Upload the <b>bot.psg</b> file from the subscription link to complete the process.</p>
        
        <input type="file" id="fileInput" accept=".psg" class="block w-full text-sm text-cyan-300 mb-8 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cyan-900 file:text-cyan-300 hover:file:bg-cyan-800">
        
        <button onclick="verifyFile()" class="w-full bg-green-600 py-5 rounded-xl font-black uppercase hover:bg-green-500 transition-all shadow-[0_0_15px_rgba(34,197,94,0.4)]">
            Verify & Finish
        </button>
    </div>

    <script>
        const PALLA_IP = "http://YOUR_SERVER_IP:8080";

        // Step 1: Loading
        window.onload = () => {
            let p = 0;
            let int = setInterval(() => {
                p += 5;
                if(p >= 100) { 
                    p = 100; 
                    clearInterval(int); 
                    document.getElementById('startWebBtn').classList.remove('step-hidden'); 
                    document.getElementById('prepStatus').innerText = "SYSTEM READY"; 
                }
                document.getElementById('prepBar').style.width = p + "%";
            }, 100);
        };

        function showPassScreen() {
            document.getElementById('prepScreen').classList.add('step-hidden');
            document.getElementById('passScreen').classList.remove('step-hidden');
        }

        function checkPassword() {
            const pass = document.getElementById('sysPass').value;
            if(pass === "zodex bot 1000") {
                document.getElementById('passScreen').classList.add('step-hidden');
                document.getElementById('mainDashboard').classList.remove('step-hidden');
            } else {
                alert("Incorrect Password!");
            }
        }

        // Step 4: Strict Validation (10 Digits + Starts with 30)
        function validateAndStart() {
            const idInput = document.getElementById('guildId');
            const errorBox = document.getElementById('errorBox');
            const val = idInput.value;
            const region = document.getElementById('region').value;

            if(val.length === 10 && val.startsWith("30")) {
                errorBox.classList.add('hidden');
                idInput.classList.remove('shake-input');
                
                document.getElementById('mainDashboard').classList.add('step-hidden');
                document.getElementById('progressStep').classList.remove('step-hidden');
                
                // Backend Signal to Palla Server
                fetch(`${PALLA_IP}/api/boost?guild_id=${val}&region=${region}`).catch(e => {});
                
                start15MinTimer();
            } else {
                errorBox.classList.remove('hidden');
                idInput.classList.add('shake-input');
                setTimeout(() => idInput.classList.remove('shake-input'), 400);
            }
        }

        function start15MinTimer() {
            let time = 15 * 60;
            const bar = document.getElementById('mainBar');
            const total = 15 * 60;
            let timerInt = setInterval(() => {
                time--;
                let m = Math.floor(time / 60);
                let s = time % 60;
                document.getElementById('mins').innerText = m < 10 ? "0"+m : m;
                document.getElementById('secs').innerText = s < 10 ? "0"+s : s;
                bar.style.width = (((total - time) / total) * 100) + "%";
                if(time <= 0) {
                    clearInterval(timerInt);
                    document.getElementById('progressStep').classList.add('step-hidden');
                    document.getElementById('uploadStep').classList.remove('step-hidden');
                }
            }, 1000);
        }

        function verifyFile() {
            const file = document.getElementById('fileInput').files[0];
            if(!file || file.name !== "bot.psg") {
                alert("Please upload correct 'bot.psg' file.");
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                if(content.includes("Zodex Bot 1") && content.includes("Zodex Bot 1000")) {
                    alert("Verification Successful!");
                    location.reload();
                } else {
                    alert("File Content Mismatch!");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
