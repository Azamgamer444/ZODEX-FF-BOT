<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZODEX - Global Injector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050b18; color: #e2e8f0; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }
        .neon-border { border: 2px solid #00d2ff; box-shadow: 0 0 15px #00d2ff; }
        .glass-card { background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(0, 210, 255, 0.2); }
        .step-hidden { display: none; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d2ff, #005f73); transition: width 1s linear; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div id="prepScreen" class="text-center w-full max-w-md">
        <h2 class="text-cyan-400 font-bold mb-4 animate-pulse">PREPARING SERVERS...</h2>
        <div class="w-full bg-gray-900 h-1 mb-8"><div id="prepBar" class="h-full bg-cyan-500 shadow-[0_0_10px_#00d2ff] transition-all" style="width:0%"></div></div>
        <button id="startBtn" onclick="showPass()" class="step-hidden w-full neon-border bg-cyan-500 text-black font-black py-4 rounded-xl">START WEBSITE</button>
    </div>

    <div id="passScreen" class="glass-card step-hidden w-full max-w-md p-8 rounded-3xl text-center">
        <h2 class="text-cyan-400 font-bold mb-6">ENTER ACCESS KEY</h2>
        <input type="password" id="sysPass" placeholder="PASSWORD..." class="w-full bg-black border border-cyan-900 p-4 rounded-lg text-center mb-4">
        <button onclick="checkPass()" class="w-full bg-cyan-600 py-3 rounded-lg font-bold">UNLOCK SYSTEM</button>
    </div>

    <div id="mainDashboard" class="glass-card step-hidden w-full max-w-md p-8 rounded-3xl">
        <h1 class="text-3xl font-black text-center text-cyan-400 mb-8 tracking-tighter">ZODEX INJECTOR</h1>
        <div class="space-y-4">
            <div>
                <label class="text-[10px] text-cyan-500 uppercase">Select Region (Country)</label>
                <select id="region" class="w-full bg-black border border-cyan-900 p-3 rounded-lg text-sm">
                    <option value="IND">INDIA</option>
                    <option value="BR">BRAZIL</option>
                    <option value="ME">MIDDLE EAST</option>
                    <option value="PK">PAKISTAN</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] text-cyan-500 uppercase">Device Type</label>
                <select id="device" class="w-full bg-black border border-cyan-900 p-3 rounded-lg text-sm">
                    <option value="Android">ANDROID</option>
                    <option value="iOS">iOS</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] text-cyan-500 uppercase">Guild ID (10 Digits starting with 30)</label>
                <input type="text" id="guildId" maxlength="10" placeholder="30XXXXXXXX" class="w-full bg-black border border-cyan-900 p-4 text-center text-xl font-bold rounded-lg">
            </div>
            <button onclick="validate()" class="w-full neon-border bg-cyan-500 text-black font-black py-4 rounded-xl uppercase">Initialize Injection</button>
        </div>
    </div>

    <div id="progressStep" class="glass-card step-hidden w-full max-w-md p-8 rounded-3xl text-center">
        <h2 class="text-cyan-400 font-bold mb-2">SENDING DATA TO SERVER...</h2>
        <p id="statusUpdate" class="text-[10px] text-gray-500 mb-6">Connecting to Garena DB</p>
        <div class="w-full bg-gray-900 h-4 rounded-full overflow-hidden mb-4 border border-cyan-900">
            <div id="mainBar" class="progress-fill"></div>
        </div>
        <div class="text-4xl font-black mb-4"><span id="mins">15</span>:<span id="secs">00</span></div>
    </div>

    <div id="uploadStep" class="glass-card step-hidden w-full max-w-md p-8 rounded-3xl text-center">
        <i class="fas fa-file-upload text-cyan-400 text-5xl mb-4"></i>
        <h2 class="text-xl font-bold mb-4">VERIFICATION REQUIRED</h2>
        <p class="text-xs text-gray-400 mb-6">सर जी, अब अपनी 'bot.psg' फाइल यहाँ लोड करें</p>
        <input type="file" id="fileInput" accept=".psg" class="mb-6 text-xs">
        <button onclick="verifyFile()" class="w-full bg-green-600 py-4 rounded-xl font-bold uppercase">Verify & Finish</button>
    </div>

    <script>
        const PALLA_IP = "http://YOUR_SERVER_IP:8080";

        // Prep Bar Logic
        window.onload = () => {
            let p = 0;
            let int = setInterval(() => {
                p += 5;
                document.getElementById('prepBar').style.width = p + "%";
                if(p >= 100) { clearInterval(int); document.getElementById('startBtn').classList.remove('step-hidden'); }
            }, 100);
        };

        function showPass() { document.getElementById('prepScreen').classList.add('step-hidden'); document.getElementById('passScreen').classList.remove('step-hidden'); }
        
        function checkPass() {
            if(document.getElementById('sysPass').value === "zodex bot 1000") {
                document.getElementById('passScreen').classList.add('step-hidden');
                document.getElementById('mainDashboard').classList.remove('step-hidden');
            } else { alert("Wrong Password!"); }
        }

        function validate() {
            const id = document.getElementById('guildId').value;
            const reg = document.getElementById('region').value;
            if(id.length !== 10 || !id.startsWith("30")) return alert("ID must be 10 digits and start with 30!");
            
            // डेटा सर्वर पर भेजना
            fetch(`${PALLA_IP}/api/boost?guild_id=${id}&region=${reg}`).catch(e => console.log("Data Sent"));

            document.getElementById('mainDashboard').classList.add('step-hidden');
            document.getElementById('progressStep').classList.remove('step-hidden');
            startTimer();
        }

        function startTimer() {
            let time = 15 * 60;
            const bar = document.getElementById('mainBar');
            const total = 15 * 60;
            
            let timerInt = setInterval(() => {
                time--;
                let m = Math.floor(time / 60);
                let s = time % 60;
                document.getElementById('mins').innerText = m < 10 ? "0"+m : m;
                document.getElementById('secs').innerText = s < 10 ? "0"+s : s;
                
                // प्रोग्रेस बार अपडेट
                let percent = ((total - time) / total) * 100;
                bar.style.width = percent + "%";

                if(time <= 0) {
                    clearInterval(timerInt);
                    document.getElementById('progressStep').classList.add('step-hidden');
                    document.getElementById('uploadStep').classList.remove('step-hidden');
                }
            }, 1000);
        }

        function verifyFile() {
            const file = document.getElementById('fileInput').files[0];
            if(!file || file.name !== "bot.psg") return alert("सर जी, सही 'bot.psg' फाइल डालिए!");

            const reader = new FileReader();
            reader.onload = function(e) {
                if(e.target.result.includes("Zodex Bot 1000")) {
                    alert("Verification Successful! Glory Boost Started.");
                    location.reload();
                } else { alert("Invalid File Content!"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
